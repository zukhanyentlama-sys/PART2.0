<body>
  <main>
    <section>
      <h1 id="mylogo">Lumi</h1>
      <center>
        <header>
          <nav>
            <a href="index.html">Home</a>
            <a href="about us.html">About Us</a>
            <a href="services.html">Services</a>
            <a href="Book Now.html">Book Now</a>
            <a href="contact.html">Contact</a>
          </nav>
        </header>
      </center>
      <hr>
      <br id="hr1">
      <center>
        <h1><b>Book Your Appointment</b></h1>
        <form class="forms-container"  id="form1">
          <label for="first-name" id="form2">First Name:</label>
          <input type="text" id="first-name" name="first-name" placeholder="Zukhanye" required>

          <label for="last-name" id="form2">Last Name:</label>
          <input type="text" id="last-name" name="last-name" placeholder="Ntlama" required>

          <label for="email"id="form2">Email:</label>
          <input type="email" id="email" name="email" placeholder="ZukhanyeNtlama@gmail.com" required>

          <label for="phone" id="form2">Phone Number:</label>
          <input type="tel" id="phone" name="phone" placeholder="072 914 9706" required>

          <label for="service" id="form2" >Select Service:</label>
          <select id="service" name="service" required>
            <option value="">--select service--</option>
            <option value="Signature Cut & Style">Signature Cut & Style - R775</option>
            <option value="Color Treatment">Color Treatment - R1,100</option>
            <option value="Highlights">Highlights (Full) - R1,375</option>
            <option value="Keratin Treatment">Keratin Treatment - R1,825</option>
            <option value="Balayage">Balayage - R1,650</option>
            <option value="Sew-In Weave">Sew-In Weave Installation - R2,250</option>
            <option value="Clip-in Extensions">Clip-in Extensions - R1,400</option>
            <option value="Tape-In Extensions">Tape-In Extensions - R1,600</option>
            <option value="Micro-link Extensions">Micro-link Extensions - R1,900</option>
            <option value="Virgin Brazilian Hair">Virgin Brazilian Hair (per bundle) - R600</option>
            <option value="Classic Manicure">Classic Manicure - R250</option>
            <option value="Gel Manicure">Gel Manicure - R350</option>
            <option value="Nail Art">Nail Art (per nail) - R75</option>
            <option value="French Manicure">French Manicure - R365</option>
            <option value="Signature Facial">Signature Facial - R825</option>
            <option value="Anti-Aging Treatment">Anti-Aging Treatment - R1,100</option>
            <option value="Deep Cleansing Facial">Deep Cleansing Facial - R600</option>
            <option value="Relaxation Massage">Relaxation Massage (60min) - R1,000</option>
            <option value="Hot Stone Therapy">Hot Stone Therapy - R1,190</option>
          </select>

          <label for="date" id="form2">Select Date:</label>
          <input type="date" id="date" name="date" required>
          <label for="time" id="form2">Select Time:</label>
          <input type="time" id="time" name="time" required>

          <p><b>Amount due: R0.00</b></p>
          <button><a href="Pay Now.html">Pay Now </a></button>
         
        </form>
      </center>
    </section>
  </main>
